<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facebook</title>
   <style>
    *{
    box-sizing: border-box;
    margin: 0;
    padding: 0;

}
body{
    margin:0;
    padding: 0;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif
}
.header{
    background-color: #3b5998;
    width:100%;
    height: 85px;
    
}
.logo{
    width: 50%;
    height: 85px;
    color: white;
    padding: 10px;
    float: left;
}
.logo-text{
    color: white;
    font-size: 45px;
    text-decoration: none;
    font-weight:Bold;
    font-family: tahoma;
    margin-left: 170px;
    
    
}
.login{
    width: 50%;
    height: 85px;
    float: left;
    padding-top:10px;
}   
.login-label{
    color: white;
}
.logincontrols{
    margin-left:115px;
    
}
.logincontrols td {
    padding-left: 7px;
}
.forgotten{
    color:#9cb4d8;
    text-decoration: none;
    font-size:11px;
}
.loginbutton{
    background: #4267b2;
    border: 1px;
    margin-left: 5px;
    font-size: 15px;
    color:#fff;
    height: 20px;
    border-color: #29487d;
    cursor: pointer;
}
.loginbutton:hover{/*eth oru action aaanu*/
    background:red;
}
.main-body{
    width: 100%;
    height: 600px;
    background: linear-gradient(white,#D3D8E8);
    padding-left: 40px;
    
}
.left-section{
    width:50%;
    padding-top: 52px;
    padding-left: 134px;
    float:left;
}
.right-section{
    width:50%;
    padding: 10px;
    padding-left: 7%;
    float:left;
}
.map-image{
    width:541px;
    
}
.para{
    font-size:20px;
    font-weight: bold;
}
.signupform{
    margin-top: 14px;
}
.text1{
    width:180px;
    height: 30px;
    margin-left: 5px;
    border:1px solid  #bdc7d8;
    border-radius:3px;
}
.text2{
    width:371px;
    height:30px ;
    margin-left:5px;
    margin-top:11px;
    border:1px solid #bdc7d8;
    border-radius:3px;
}
.birthday{
    margin-top: 10px;
    width:100px;
    color: #929496;
    font-size: 13px;
    font-weight:bold;

}
.birthday h3{
    margin-bottom: 5px;
}
#dob{
    margin-top:5px;
    width: 150px;
    border: 1px solid #bdc7d8 ;
    border-radius:3px;
}
.gender{
    margin-top:13px;

}
.gender h3{
    color:#929496;
    font: size 16px;
    font-weight: bold;
    margin-bottom: 5px;
}
.policy{
    margin-top: 18px;
    color: black;
    font-weight: bold;
    font-size: 13px;
}
.signupbtn{
    margin-top: 21px;
    margin-left:0;
    width: 160px;
    height: 45px;
    background-color: rgb(71, 130, 71);
    border-radius: 10px;
    color: #fff;
    font-size: 15px;
}
   </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">
                <a class="logo-text" href="#">Facebook</a>
            </div>
            <div class="login">
                <form action="post">
                <table class="logincontrols">
                 <tr>
                   <td><label class="login-label"for="username">username</label></td>
                   <td><label class="login-label" for="usrname">password</label></td>
                 </tr>
                 <tr>
                    <td><input type="text"></td>
                    <td><input type="text"></td>
                    <td><input class="loginbutton" type="submit" value="login"></td>
                 </tr>
                 <tr>
                    <td></td>
                    <td><a class="forgotten" href="#">Forgotten passord</a></td>
                 </tr>
                </table>
                </form>
            </div>
        </div>
        <div class="main-body">
            <div class="left-section">
                <p class="para">Facebook helps to connect and share with the <br>peoples in your life</p><br>
                <img class="map-image" src="image/connect_map.jpg " alt="map image">
            </div>
            <div class="right-section">
                <h1>Create an Account</h1><br>
                <p>It's free and always will be</p>
                <form class="signupform"action="">
                    <div class="name">
                        <input class="text1" type="text" placeholder="First name">
                        <input class="text1" type="text" placeholder="Last name">
                    </div>
                    <div class="details">
                        <input class="text2" type="text"placeholder="Email or Mobile number"><br>
                        <input class="text2" type="text"placeholder="Re-enter email or mobile number"><br>
                        <input class="text2" type="password"placeholder="New password"><br>
                     </div>
                </form>
                <div class="birthday">
                    <h3>Birthday</h3>
                    <input id="dob" type="date">
                </div>
                <div class="gender">
                    <h3>Gender</h3>
                    <label for="male">male</label>
                    <input type="radio"name="gender">
                    <label for="female">female</label>
                    <input type="radio"name="gender">
                    <label for="custom">custom</label>
                    <input type="radio"name="gender">
                </div>
                <p class="policy">By clicking Create an account,<br> you agree to
                    our Terms and that you have read our Data Policy,<br> 
                    including our Cookie Use.</p>

                    <input class="signupbtn" type="submit"value="Sign up">

            </div>  
        </div>
    </div>
</body>
</html>
